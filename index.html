<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Razzormail</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #111827 0%, #1f2937 100%);
            color: #f9fafb;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            line-height: 1.6;
        }
        
        .container {
            text-align: center;
            max-width: 800px;
            width: 100%;
        }
        
        h1 {
            font-size: 4rem;
            font-weight: 900;
            margin-bottom: 1rem;
            background: linear-gradient(90deg, #9333ea 0%, #7c3aed 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.025em;
        }
        
        .tagline {
            font-size: 1.5rem;
            color: #9ca3af;
            margin-bottom: 0.5rem;
            font-weight: 300;
        }
        
        .subtitle {
            font-size: 1.25rem;
            color: #9ca3af;
            margin-bottom: 3rem;
        }
        
        .card {
            background: rgba(31, 41, 55, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(147, 51, 234, 0.2);
            border-radius: 1rem;
            padding: 2.5rem;
            margin-bottom: 2rem;
            transition: all 0.3s ease;
        }
        
        .card:hover {
            transform: translateY(-5px);
            border-color: rgba(147, 51, 234, 0.5);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        
        .navigation {
            display: flex;
            gap: 2rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 3rem;
        }
        
        .nav-link {
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s ease;
            display: inline-block;
            color: #e5e7eb;
            background: rgba(31, 41, 55, 0.8);
            border: 1px solid rgba(147, 51, 234, 0.3);
        }
        
        .nav-link:hover {
            background: rgba(147, 51, 234, 0.2);
            border-color: rgba(147, 51, 234, 0.8);
            transform: translateY(-2px);
        }
        
        .footer {
            margin-top: 4rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(75, 85, 99, 0.3);
            color: #6b7280;
            font-size: 0.9rem;
        }
        
        @media (max-width: 768px) {
            h1 {
                font-size: 3rem;
            }
            
            .tagline {
                font-size: 1.25rem;
            }
            
            .subtitle {
                font-size: 1.1rem;
            }
            
            .card {
                padding: 1.5rem;
            }
            
            .navigation {
                gap: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Razzormail</h1>
        <p class="tagline">A Firm Fit</p>
        <p class="subtitle">For Your Needs</p>
        
        <nav class="navigation">
            <a href="#intro" class="nav-link">Intro</a>
            <a href="#work" class="nav-link">Work</a>
            <a href="#about" class="nav-link">About</a>
            <a href="#contact" class="nav-link">Contact</a>
        </nav>
        
        <div class="card">
            <h2 style="font-size: 1.5rem; margin-bottom: 1rem; color: #d1d5db;">Coming Soon</h2>
            <p style="color: #9ca3af; line-height: 1.8;">
                We're building the next generation of email services with cutting-edge security, 
                modern design, and uncompromising privacy. Stay tuned for updates.
            </p>
        </div>
        
        <div class="footer">
            <p>&copy; <span id="currentYear">2024</span> razzormail. All rights reserved.</p>
        </div>
    </div>
    
    <script>
        // Auto-update copyright year
        document.getElementById('currentYear').textContent = new Date().getFullYear();
    </script>
</body>
</html>
